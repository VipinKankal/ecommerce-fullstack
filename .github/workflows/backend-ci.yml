name: Backend CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  codeql-java:
    name: CodeQL (Java)
    if: ${{ vars.ENABLE_BACKEND_CI == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [java]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  dependency-audit-java:
    name: Dependency Audit (Java)
    if: ${{ vars.ENABLE_BACKEND_CI == 'true' && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  migration-smoke:
    if: ${{ vars.ENABLE_BACKEND_CI == 'true' }}
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ecommerce
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Prepare fresh migration DB
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e "DROP DATABASE IF EXISTS ecommerce_migration_smoke;"
          mysql -h 127.0.0.1 -uroot -proot -e "CREATE DATABASE ecommerce_migration_smoke CHARACTER SET utf8mb4 COLLATE utf8mb4_0900_ai_ci;"

      - name: Flyway migrate (fresh DB)
        run: ./mvnw -Dflyway.url=jdbc:mysql://127.0.0.1:3306/ecommerce_migration_smoke -Dflyway.user=root -Dflyway.password=root org.flywaydb:flyway-maven-plugin:11.14.1:migrate

      - name: Boot app smoke (post-migrate)
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/ecommerce_migration_smoke
          DB_USERNAME: root
          DB_PASSWORD: root
          JWT_SECRET_KEY: CI_JWT_SECRET_KEY_012345678901234567890123456789012345678901234567890123456789
          MAIL_USERNAME: ci@example.com
          MAIL_PASSWORD: ci-password
          JPA_SHOW_SQL: "false"
        run: |
          nohup ./mvnw spring-boot:run > migration-smoke-app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for app health
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/actuator/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time after migrations"
          tail -n 200 migration-smoke-app.log || true
          exit 1

      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi
          tail -n 120 migration-smoke-app.log || true

  build-test:
    if: ${{ vars.ENABLE_BACKEND_CI == 'true' }}
    runs-on: ubuntu-latest
    needs: migration-smoke
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ecommerce
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Compile
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/ecommerce
          DB_USERNAME: root
          DB_PASSWORD: root
          JWT_SECRET_KEY: CI_JWT_SECRET_KEY_012345678901234567890123456789012345678901234567890123456789
          MAIL_USERNAME: ci@example.com
          MAIL_PASSWORD: ci-password
        run: ./mvnw -DskipTests compile

      - name: Test
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/ecommerce
          DB_USERNAME: root
          DB_PASSWORD: root
          JWT_SECRET_KEY: CI_JWT_SECRET_KEY_012345678901234567890123456789012345678901234567890123456789
          MAIL_USERNAME: ci@example.com
          MAIL_PASSWORD: ci-password
        run: ./mvnw test -DskipITs

  postman-smoke:
    if: ${{ vars.ENABLE_BACKEND_CI == 'true' }}
    runs-on: ubuntu-latest
    needs: build-test
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ecommerce
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Start app
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/ecommerce
          DB_USERNAME: root
          DB_PASSWORD: root
          JWT_SECRET_KEY: CI_JWT_SECRET_KEY_012345678901234567890123456789012345678901234567890123456789
          MAIL_USERNAME: ci@example.com
          MAIL_PASSWORD: ci-password
          JPA_SHOW_SQL: "false"
        run: |
          nohup ./mvnw spring-boot:run > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for app
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time"
          tail -n 200 app.log || true
          exit 1

      - name: Run Postman smoke
        run: |
          newman run docs/postman/Ecommerce-CI-Smoke.postman_collection.json \
            --env-var baseUrl=http://127.0.0.1:8080

      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi
          tail -n 100 app.log || true
