spring.application.name=ecommerce
server.port=8080

# Database Configuration
spring.jpa.hibernate.ddl-auto=none
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Payment gateway secrets (set via environment or secrets manager)
payment.razorpay.api-key=${RAZORPAY_API_KEY:}
payment.razorpay.api-secret=${RAZORPAY_API_SECRET:}
payment.stripe.secret-key=${STRIPE_SECRET_KEY:}
payment.phonepe.base-url=${PHONEPE_BASE_URL:}
payment.phonepe.merchant-id=${PHONEPE_MERCHANT_ID:}
payment.phonepe.salt-key=${PHONEPE_SALT_KEY:}
payment.phonepe.salt-index=${PHONEPE_SALT_INDEX:}

# Security / CORS / Rate limiting
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}
app.backend.base-url=${BACKEND_BASE_URL:http://localhost:8080}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.rate-limit.max-requests-per-minute=${RATE_LIMIT_MAX_REQUESTS:30}
app.rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}
app.jwt.secret=${JWT_SECRET_KEY:}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.email.dev-fallback-enabled=${APP_EMAIL_DEV_FALLBACK_ENABLED:true}
app.email.dev-log-otp=${APP_EMAIL_DEV_LOG_OTP:true}
app.gst.verification.mode=${GST_VERIFICATION_MODE:MANUAL}
app.gst.verification.manual-active-gstins=${GST_VERIFICATION_ACTIVE_GSTINS:}
app.gst.verification.api-url=${GST_VERIFICATION_API_URL:}
app.gst.verification.api-key=${GST_VERIFICATION_API_KEY:}
app.compliance.attachments.allowed-hosts=${COMPLIANCE_ATTACHMENT_ALLOWED_HOSTS:res.cloudinary.com,*.cloudinary.com}
app.compliance.attachments.max-count=${COMPLIANCE_ATTACHMENT_MAX_COUNT:10}
app.compliance.attachments.max-url-length=${COMPLIANCE_ATTACHMENT_MAX_URL_LENGTH:2048}

# Flyway migrations
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.url=${FLYWAY_URL:${DB_URL:jdbc:mysql://localhost:3306/ecommerce}}
spring.flyway.user=${FLYWAY_USER:${DB_USERNAME:root}}
spring.flyway.password=${FLYWAY_PASSWORD:${DB_PASSWORD:}}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=${FLYWAY_BASELINE_VERSION:22}
spring.flyway.baseline-description=${FLYWAY_BASELINE_DESCRIPTION:legacy_schema_before_tax}
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# Swagger/OpenAPI (disable in prod by default unless explicitly enabled)
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator / Monitoring
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
