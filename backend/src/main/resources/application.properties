spring.application.name=ecommerce
server.port=8080

# Database Configuration
spring.jpa.hibernate.ddl-auto=none
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Payment gateway secrets (set via environment or secrets manager)
payment.razorpay.api-key=${RAZORPAY_API_KEY:}
payment.razorpay.api-secret=${RAZORPAY_API_SECRET:}
payment.stripe.secret-key=${STRIPE_SECRET_KEY:}

# Security / CORS / Rate limiting
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.rate-limit.max-requests-per-minute=${RATE_LIMIT_MAX_REQUESTS:30}
app.rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}
app.jwt.secret=${JWT_SECRET_KEY:}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Flyway migrations
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# Swagger/OpenAPI (disable in prod by default unless explicitly enabled)
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator / Monitoring
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
