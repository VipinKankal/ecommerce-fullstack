spring.datasource.url=jdbc:h2:mem:ecommerce_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Keep Flyway off for fast isolated H2 tests.
# Real migration validation runs in CI `migration-smoke` job on fresh MySQL.
spring.flyway.enabled=false
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=
spring.mail.password=
app.jwt.secret=test-jwt-secret-key-that-is-long-enough-for-tests-1234567890abcdef
app.jwt.expiration-ms=86400000
app.frontend.base-url=http://localhost:3000
app.cors.allowed-origins=http://localhost:3000
app.gst.verification.mode=MANUAL
app.gst.verification.manual-active-gstins=29ABCDE1234F1ZW,27ABCDE1234F1Z5
payment.razorpay.api-key=
payment.razorpay.api-secret=
payment.stripe.secret-key=
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
